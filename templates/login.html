<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in · SMB CRM</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-sm">
    <div class="flex items-center gap-2 justify-center mb-8">
      <div class="h-9 w-9 rounded-lg bg-blue-600 flex items-center justify-center text-white font-bold">S</div>
      <span class="font-bold text-xl tracking-tight">SMB CRM</span>
    </div>
    <div class="rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
      <h1 class="text-lg font-bold mb-1">Sign in</h1>
      <p class="text-sm text-slate-400 mb-5">Use a demo account below to explore the CRM.</p>
      {% if error %}
      <div class="mb-4 rounded-lg bg-red-50 text-red-700 text-sm px-3 py-2">{{ error }}</div>
      {% endif %}
      <form method="post" class="space-y-3">
        <input type="hidden" name="next" value="{{ next }}">
        <div>
          <label class="block text-xs font-semibold tracking-wide text-slate-400 mb-1">Email</label>
          <input required type="email" name="email" placeholder="maria@smbcrm.demo"
                 class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200">
        </div>
        <div>
          <label class="block text-xs font-semibold tracking-wide text-slate-400 mb-1">Password</label>
          <input required type="password" name="password" placeholder="demo1234"
                 class="w-full rounded-lg border border-slate-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-200">
        </div>
        <button class="w-full rounded-lg bg-slate-900 text-white text-sm font-medium px-4 py-2 hover:bg-slate-700 mt-2">Sign in</button>
      </form>
    </div>
    <div class="mt-5 rounded-lg bg-blue-50 text-blue-700 text-xs px-4 py-3 leading-relaxed">
      <strong>Demo accounts</strong> (password: <code class="font-mono">demo1234</code>)<br>
      maria@smbcrm.demo · sam@smbcrm.demo
    </div>
  </div>
</body>
</html>
